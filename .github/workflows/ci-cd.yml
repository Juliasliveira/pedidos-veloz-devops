name: CI/CD - Pedidos Veloz

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/pedidos-veloz

jobs:
  test:
    name: Lint e Testes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [pedidos, estoque, pagamentos]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Instalar dependencias
        working-directory: services/${{ matrix.service }}
        run: npm ci
      - name: Testes
        working-directory: services/${{ matrix.service }}
        run: npm test --if-present

  build:
    name: Build e Push de Imagens
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == '"'"'refs/heads/main'"'"'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [pedidos, estoque, pagamentos]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            latest
      - uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    name: Deploy em Producao
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == '"'"'refs/heads/main'"'"'
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v3
      - run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
      - run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl rollout status deployment/pedidos --timeout=120s
